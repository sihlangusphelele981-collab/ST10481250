<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>

    <h3>Contact</h3>

    <form>
        
        <label for="name">First Name:</label><br>
        <input type="text" id="name" name="firstname" placeholder="Your first name"><br><br>

        <label for="surname">Last Name:</label><br>
        <input type="text" id="surname" name="lastname" placeholder="Your surname"><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" placeholder="Write your message here..."></textarea><br><br>

        <input type="submit" value="Send Message">

    <form>

</body>
</html>
